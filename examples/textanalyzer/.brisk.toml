[package]
name = "AurorTextAnalyzer"
version = "0.1.0"

[app]
bundle_id = "dev.aurorality.example.textanalyzer"
deployment_target = "17.0"
sources = "Sources"
resources = ["views", "scripts"]

[build]
linker_flags = ["-L../../target/debug", "-laurorality_core", "-framework", "JavaScriptCore"]

[pre_build]
commands = [
    "cargo build -p aurorality-core --features js --manifest-path ../../Cargo.toml",
    "cargo run --manifest-path ../../Cargo.toml -p aurorality-core --features js --bin uniffi-bindgen generate --library ../../target/debug/libaurorality_core.dylib --language swift --out-dir ../../generated",
    "cp ../../generated/aurorality_coreFFI.modulemap ../../generated/module.modulemap",
    "aurorality build --watch views --out ../../generated/ir"
]
